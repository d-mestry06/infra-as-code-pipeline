name: CD — Deploy to Production

# Triggers only after CI completes successfully on a merge to main.
# This guarantees the staging ECR image (built during the PR) exists
# before we attempt to promote it — no rebuild, pure artifact promotion.
on:
  workflow_run:
    workflows: ["CI — Lint, Build, Deploy to Staging"]
    types: [completed]
    branches: [main]

  # Allow manual deploys with an optional image tag override
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (leave blank to use latest main SHA)"
        required: false
        default: ""

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Gate — abort if upstream CI failed
  # ─────────────────────────────────────────────
  check-ci-status:
    name: Check CI Status
    runs-on: ubuntu-latest

    outputs:
      sha: ${{ steps.resolve.outputs.sha }}

    steps:
      - name: Abort if CI did not succeed
        if: >
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion != 'success'
        run: |
          echo "Upstream CI conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo "Aborting CD — only deploying after a successful CI run."
          exit 1

      - name: Resolve image tag (SHA)
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.image_tag }}" ]; then
            # Manual override
            SHA="${{ github.event.inputs.image_tag }}"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            # SHA of the HEAD commit that triggered CI (the PR merge commit)
            SHA="${{ github.event.workflow_run.head_sha }}"
          else
            SHA="${{ github.sha }}"
          fi
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Resolved image tag (SHA): $SHA"

  # ─────────────────────────────────────────────
  # Job 2: Promote staging image → production ECR
  # Pure tag-and-push, zero rebuild.
  # ─────────────────────────────────────────────
  promote-image:
    name: Promote Staging Image to Production
    runs-on: ubuntu-latest
    needs: check-ci-status

    outputs:
      image_uri: ${{ steps.promote.outputs.image_uri }}
      image_tag: ${{ steps.promote.outputs.image_tag }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Promote staging image to production ECR
        id: promote
        env:
          REGISTRY:     ${{ steps.login-ecr.outputs.registry }}
          STAGING_REPO: ${{ secrets.ECR_REPOSITORY_STAGING }}
          PROD_REPO:    ${{ secrets.ECR_REPOSITORY_PROD }}
          TAG:          ${{ needs.check-ci-status.outputs.sha }}
        run: |
          STAGING_URI="$REGISTRY/$STAGING_REPO:$TAG"
          PROD_URI="$REGISTRY/$PROD_REPO:$TAG"
          PROD_LATEST="$REGISTRY/$PROD_REPO:latest"

          echo "=============================="
          echo "Promoting: $STAGING_URI"
          echo "       To: $PROD_URI"
          echo "=============================="

          # Pull the exact image that was tested in staging
          docker pull "$STAGING_URI"

          # Retag for prod repo and push both SHA and :latest
          docker tag "$STAGING_URI" "$PROD_URI"
          docker tag "$STAGING_URI" "$PROD_LATEST"
          docker push "$PROD_URI"
          docker push "$PROD_LATEST"

          echo "image_uri=$PROD_URI" >> $GITHUB_OUTPUT
          echo "image_tag=$TAG"      >> $GITHUB_OUTPUT
          echo "Promotion complete."

  # ─────────────────────────────────────────────
  # Job 3: Manual approval gate
  # Requires a GitHub environment named "production"
  # with a required reviewer configured in repo settings.
  # ─────────────────────────────────────────────
  production-approval:
    name: Awaiting Production Approval
    runs-on: ubuntu-latest
    needs: promote-image
    environment: production

    steps:
      - name: Approval granted
        run: |
          echo "Production deployment approved."
          echo "Image : ${{ needs.promote-image.outputs.image_uri }}"
          echo "Tag   : ${{ needs.promote-image.outputs.image_tag }}"

      - name: Slack — production deploy starting
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":rocket: *Production deploy starting*",
              "attachments": [{
                "color": "#0066cc",
                "fields": [
                  { "title": "Repo",  "value": "${{ github.repository }}", "short": true },
                  { "title": "Tag",   "value": "${{ needs.promote-image.outputs.image_tag }}", "short": true },
                  { "title": "Actor", "value": "${{ github.actor }}",      "short": true },
                  { "title": "Run",   "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>", "short": false }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ─────────────────────────────────────────────
  # Job 4: Deploy to production + auto-rollback
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [promote-image, production-approval]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Checkout the exact commit that was built and tested
          ref: ${{ needs.promote-image.outputs.image_tag }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Validate image URI
        run: |
          IMAGE_URI="${{ needs.promote-image.outputs.image_uri }}"
          if [ -z "$IMAGE_URI" ]; then
            echo "ERROR: image_uri is empty — aborting."
            exit 1
          fi
          echo "Deploying: $IMAGE_URI"

      - name: Save current task definition (rollback target)
        id: rollback-target
        run: |
          CURRENT=$(aws ecs describe-services \
            --cluster ${{ secrets.ECS_CLUSTER_PROD }} \
            --services ${{ secrets.ECS_SERVICE_PROD }} \
            --query "services[0].taskDefinition" \
            --output text)
          echo "task_def=$CURRENT" >> $GITHUB_OUTPUT
          echo "Rollback target saved: $CURRENT"

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ steps.rollback-target.outputs.task_def }} \
            --query "taskDefinition" \
            > /tmp/prod-task-def.json

      - name: Render updated task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: /tmp/prod-task-def.json
          container-name:  app
          image:           ${{ needs.promote-image.outputs.image_uri }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:            ${{ steps.render-task-def.outputs.task-definition }}
          service:                    ${{ secrets.ECS_SERVICE_PROD }}
          cluster:                    ${{ secrets.ECS_CLUSTER_PROD }}
          wait-for-service-stability: false

      - name: Wait for ECS to stabilize (10 min timeout)
        id: wait-stable
        run: |
          if timeout 600 aws ecs wait services-stable \
              --cluster ${{ secrets.ECS_CLUSTER_PROD }} \
              --services ${{ secrets.ECS_SERVICE_PROD }}; then
            echo "stable=true"  >> $GITHUB_OUTPUT
            echo "ECS service is stable."
          else
            echo "stable=false" >> $GITHUB_OUTPUT
            echo "ECS service did NOT stabilize within 10 minutes."
          fi

      - name: Auto-rollback on failure
        if: steps.wait-stable.outputs.stable == 'false'
        run: |
          echo "ROLLING BACK to: ${{ steps.rollback-target.outputs.task_def }}"
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER_PROD }} \
            --service  ${{ secrets.ECS_SERVICE_PROD }} \
            --task-definition ${{ steps.rollback-target.outputs.task_def }} \
            --force-new-deployment
          echo "Waiting for rollback to stabilize..."
          timeout 600 aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER_PROD }} \
            --services ${{ secrets.ECS_SERVICE_PROD }} || true
          echo "Rollback complete."

      - name: Fail pipeline after rollback
        if: steps.wait-stable.outputs.stable == 'false'
        run: exit 1

      - name: Verify production health via ALB
        if: steps.wait-stable.outputs.stable == 'true'
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names ${{ secrets.PROD_ALB_NAME }} \
            --query "LoadBalancers[0].DNSName" \
            --output text)

          echo "Checking http://$ALB_DNS/health/check ..."
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://$ALB_DNS/health/check" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed on attempt $i."
              echo "Live at: http://$ALB_DNS"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 15s..."
            sleep 15
          done
          echo "ERROR: Health check did not return 200 after 10 attempts."
          exit 1

      - name: Deployment summary
        if: steps.wait-stable.outputs.stable == 'true'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  PRODUCTION DEPLOYMENT COMPLETE"
          echo "  Image : ${{ needs.promote-image.outputs.image_uri }}"
          echo "  Tag   : ${{ needs.promote-image.outputs.image_tag }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Slack — production deploy succeeded
        if: steps.wait-stable.outputs.stable == 'true'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":white_check_mark: *Production deploy succeeded*",
              "attachments": [{
                "color": "good",
                "fields": [
                  { "title": "Repo",  "value": "${{ github.repository }}", "short": true },
                  { "title": "Tag",   "value": "${{ needs.promote-image.outputs.image_tag }}", "short": true },
                  { "title": "Run",   "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>", "short": false }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack — production rolled back
        if: steps.wait-stable.outputs.stable == 'false'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":warning: *Production deploy FAILED — auto-rollback triggered*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  { "title": "Repo",           "value": "${{ github.repository }}", "short": true },
                  { "title": "Failed tag",     "value": "${{ needs.promote-image.outputs.image_tag }}", "short": true },
                  { "title": "Rolled back to", "value": "${{ steps.rollback-target.outputs.task_def }}", "short": false },
                  { "title": "Run",            "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>", "short": false }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
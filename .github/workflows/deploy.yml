name: CD — Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (defaults to latest main SHA)"
        required: false
        default: ""

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build & push production image
  # ─────────────────────────────────────────────
  build-production-image:
    name: Promote Staging Image to Production
    runs-on: ubuntu-latest

    outputs:
      image_uri: ${{ steps.promote.outputs.image_uri }}
      image_tag: ${{ steps.promote.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Promote staging image to production ECR
        id: promote
        env:
          REGISTRY:     ${{ steps.login-ecr.outputs.registry }}
          STAGING_REPO: ${{ secrets.ECR_REPOSITORY_STAGING }}
          PROD_REPO:    ${{ secrets.ECR_REPOSITORY_PROD }}
          INPUT_TAG:    ${{ github.event.inputs.image_tag }}
        run: |
          TAG="${INPUT_TAG:-${{ github.sha }}}"
          STAGING_URI="$REGISTRY/$STAGING_REPO:$TAG"
          PROD_URI="$REGISTRY/$PROD_REPO:$TAG"

          if docker pull "$STAGING_URI" 2>/dev/null; then
            echo "Found staging image, promoting..."
            docker tag  "$STAGING_URI" "$PROD_URI"
          else
            echo "Staging image not found, building from source..."
            docker build --build-arg APP_VERSION="$TAG" -t "$PROD_URI" app/
          fi

          docker push "$PROD_URI"

          echo "image_uri=$PROD_URI" >> $GITHUB_OUTPUT
          echo "image_tag=$TAG"      >> $GITHUB_OUTPUT
          echo "Promoted/Built: $PROD_URI"

  # ─────────────────────────────────────────────
  # Job 2: Manual approval gate
  # ─────────────────────────────────────────────
  production-approval:
    name: Awaiting Production Approval
    runs-on: ubuntu-latest
    needs: build-production-image
    environment: production

    steps:
      - name: Approval granted
        run: |
          echo "Production deployment approved."
          echo "Image: ${{ needs.build-production-image.outputs.image_uri }}"
          echo "Tag:   ${{ needs.build-production-image.outputs.image_tag }}"

      - name: Slack — production deploy starting
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":rocket: *Production deploy starting*",
              "attachments": [{
                "color": "#0066cc",
                "fields": [
                  { "title": "Repo",  "value": "${{ github.repository }}", "short": true },
                  { "title": "Tag",   "value": "${{ needs.build-production-image.outputs.image_tag }}", "short": true },
                  { "title": "Actor", "value": "${{ github.actor }}",      "short": true },
                  { "title": "Run", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>", "short": false }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ─────────────────────────────────────────────
  # Job 3: Deploy to production + auto-rollback
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-production-image, production-approval]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Save current task definition (rollback target)
        id: rollback-target
        run: |
          CURRENT=$(aws ecs describe-services \
            --cluster ${{ secrets.ECS_CLUSTER_PROD }} \
            --services ${{ secrets.ECS_SERVICE_PROD }} \
            --query "services[0].taskDefinition" \
            --output text)
          echo "task_def=$CURRENT" >> $GITHUB_OUTPUT
          echo "Rollback target: $CURRENT"

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_SERVICE_PROD }} \
            --query "taskDefinition" \
            > /tmp/prod-task-def.json

      - name: Render updated task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: /tmp/prod-task-def.json
          container-name:  app
          image:           ${{ needs.build-production-image.outputs.image_uri }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:            ${{ steps.render-task-def.outputs.task-definition }}
          service:                    ${{ secrets.ECS_SERVICE_PROD }}
          cluster:                    ${{ secrets.ECS_CLUSTER_PROD }}
          wait-for-service-stability: false

      - name: Wait for deployment to stabilize (5 min timeout)
        id: wait-stable
        run: |
          if aws ecs wait services-stable \
              --cluster ${{ secrets.ECS_CLUSTER_PROD }} \
              --services ${{ secrets.ECS_SERVICE_PROD }}; then
            echo "stable=true" >> $GITHUB_OUTPUT
          else
            echo "stable=false" >> $GITHUB_OUTPUT
          fi

      - name: Auto-rollback on failure
        if: steps.wait-stable.outputs.stable == 'false'
        run: |
          echo "ROLLING BACK to: ${{ steps.rollback-target.outputs.task_def }}"
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER_PROD }} \
            --service  ${{ secrets.ECS_SERVICE_PROD }} \
            --task-definition ${{ steps.rollback-target.outputs.task_def }} \
            --force-new-deployment
          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER_PROD }} \
            --services ${{ secrets.ECS_SERVICE_PROD }}

      - name: Fail pipeline if rollback was triggered
        if: steps.wait-stable.outputs.stable == 'false'
        run: exit 1

      - name: Verify production health via ALB
        if: steps.wait-stable.outputs.stable == 'true'
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names production-alb \
            --query "LoadBalancers[0].DNSName" \
            --output text)
          for i in {1..6}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://$ALB_DNS/health/check" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed. Live at: http://$ALB_DNS"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Warning: health check did not return 200 after 6 attempts."

      - name: Deployment summary
        if: steps.wait-stable.outputs.stable == 'true'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  PRODUCTION DEPLOYMENT COMPLETE"
          echo "  Image: ${{ needs.build-production-image.outputs.image_uri }}"
          echo "  Tag:   ${{ needs.build-production-image.outputs.image_tag }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Slack — production deploy succeeded
        if: steps.wait-stable.outputs.stable == 'true'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":white_check_mark: *Production deploy succeeded*",
              "attachments": [{
                "color": "good",
                "fields": [
                  { "title": "Repo",  "value": "${{ github.repository }}", "short": true },
                  { "title": "Tag",   "value": "${{ needs.build-production-image.outputs.image_tag }}", "short": true },
                  { "title": "Run", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>", "short": false }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack — production rolled back
        if: steps.wait-stable.outputs.stable == 'false'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":warning: *Production deploy FAILED — auto-rollback triggered*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  { "title": "Repo",           "value": "${{ github.repository }}", "short": true },
                  { "title": "Failed tag",     "value": "${{ needs.build-production-image.outputs.image_tag }}", "short": true },
                  { "title": "Rolled back to", "value": "${{ steps.rollback-target.outputs.task_def }}", "short": false },
                  { "title": "Run", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>", "short": false }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

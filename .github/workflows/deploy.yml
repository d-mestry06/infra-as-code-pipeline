name: CD - Deploy to Production

# Triggers after CI completes on main branch.
# CI runs on push to main (after PR merge) and tags the image
# with the merge commit SHA — that same SHA is what we promote here.
# workflow_run branches:[main] matches correctly because CI's
# push-to-main run has head_branch = main.
on:
  workflow_run:
    workflows: ["CI - Lint, Build, Deploy to Staging"]
    types: [completed]
    branches: [main]

  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (SHA) to deploy - must exist in staging ECR"
        required: true

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Gate — abort if CI failed
  # Resolves the merge commit SHA to use for this deploy.
  # workflow_run.head_sha = merge commit SHA = what CI
  # just built and pushed to staging ECR.
  # ─────────────────────────────────────────────
  resolve-image:
    name: Resolve Image Tag
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.resolve.outputs.image_tag }}

    steps:
      - name: Abort if CI did not succeed
        if: >
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion != 'success'
        run: |
          echo "CI conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo "Aborting — CD only runs after a successful CI."
          exit 1

      - name: Resolve image tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            # workflow_run: head_sha is the merge commit SHA
            # CI built and pushed this exact SHA to staging ECR
            TAG="${{ github.event.workflow_run.head_sha }}"
          fi

          if [ -z "$TAG" ]; then
            echo "ERROR: could not resolve image tag"
            exit 1
          fi

          echo "image_tag=$TAG" >> $GITHUB_OUTPUT
          echo "Resolved image tag: $TAG"

  # ─────────────────────────────────────────────
  # Job 2: Promote staging image → production ECR
  # Pure retag-and-push. Zero rebuild.
  # The exact image built on push-to-main goes to prod.
  # ─────────────────────────────────────────────
  promote-image:
    name: Promote Staging Image to Production ECR
    runs-on: ubuntu-latest
    needs: resolve-image

    outputs:
      image_uri: ${{ steps.promote.outputs.image_uri }}
      image_tag: ${{ steps.promote.outputs.image_tag }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Promote staging image to production ECR
        id: promote
        env:
          REGISTRY:     ${{ steps.login-ecr.outputs.registry }}
          STAGING_REPO: ${{ secrets.ECR_REPOSITORY_STAGING }}
          PROD_REPO:    ${{ secrets.ECR_REPOSITORY_PROD }}
          TAG:          ${{ needs.resolve-image.outputs.image_tag }}
        run: |
          STAGING_URI="$REGISTRY/$STAGING_REPO:$TAG"
          PROD_URI="$REGISTRY/$PROD_REPO:$TAG"
          PROD_LATEST="$REGISTRY/$PROD_REPO:latest"

          echo "=============================="
          echo "Pulling  : $STAGING_URI"
          echo "Pushing  : $PROD_URI"
          echo "=============================="

          # Pull the exact image built and verified on push-to-main
          docker pull "$STAGING_URI"

          # Retag for prod repo — identical bits, zero rebuild
          docker tag "$STAGING_URI" "$PROD_URI"
          docker tag "$STAGING_URI" "$PROD_LATEST"
          docker push "$PROD_URI"
          docker push "$PROD_LATEST"

          echo "image_uri=$PROD_URI" >> $GITHUB_OUTPUT
          echo "image_tag=$TAG"      >> $GITHUB_OUTPUT
          echo "Promotion complete: $PROD_URI"

      - name: Verify promote outputs are set
        run: |
          URI="${{ steps.promote.outputs.image_uri }}"
          TAG="${{ steps.promote.outputs.image_tag }}"
          if [ -z "$URI" ] || [ -z "$TAG" ]; then
            echo "ERROR: promote step did not set outputs"
            exit 1
          fi
          echo "Verified — image_uri: $URI"
          echo "Verified — image_tag: $TAG"

  # ─────────────────────────────────────────────
  # Job 3: Manual approval gate
  # Requires GitHub environment "production" with
  # a required reviewer in repo Settings → Environments.
  # Forwards outputs so deploy-production can read them.
  # ─────────────────────────────────────────────
  production-approval:
    name: Awaiting Production Approval
    runs-on: ubuntu-latest
    needs: promote-image
    environment: production

    outputs:
      image_uri: ${{ needs.promote-image.outputs.image_uri }}
      image_tag: ${{ needs.promote-image.outputs.image_tag }}

    steps:
      - name: Confirm approved image
        run: |
          echo "Production deployment approved."
          echo "Image URI : ${{ needs.promote-image.outputs.image_uri }}"
          echo "Image tag : ${{ needs.promote-image.outputs.image_tag }}"
          if [ -z "${{ needs.promote-image.outputs.image_uri }}" ]; then
            echo "ERROR: image_uri is empty — cannot proceed"
            exit 1
          fi

      - name: Slack - production deploy starting
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":rocket: *Production deploy approved and starting*",
              "attachments": [{
                "color": "#0066cc",
                "fields": [
                  { "title": "Repo",  "value": "${{ github.repository }}", "short": true },
                  { "title": "Tag",   "value": "${{ needs.promote-image.outputs.image_tag }}", "short": true },
                  { "title": "Actor", "value": "${{ github.actor }}",      "short": true },
                  { "title": "Run",   "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>", "short": false }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ─────────────────────────────────────────────
  # Job 4: Deploy to production + auto-rollback
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [promote-image, production-approval]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Resolve image URI
        id: image
        run: |
          IMAGE_URI="${{ needs.promote-image.outputs.image_uri }}"
          IMAGE_TAG="${{ needs.promote-image.outputs.image_tag }}"

          if [ -z "$IMAGE_URI" ]; then
            IMAGE_URI="${{ needs.production-approval.outputs.image_uri }}"
            IMAGE_TAG="${{ needs.production-approval.outputs.image_tag }}"
            echo "Used forwarded outputs from production-approval"
          fi

          if [ -z "$IMAGE_URI" ]; then
            echo "ERROR: image_uri is empty — aborting deployment"
            exit 1
          fi

          echo "uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Deploying: $IMAGE_URI"

      - name: Save current task definition (rollback target)
        id: rollback-target
        run: |
          CURRENT=$(aws ecs describe-services \
            --cluster ${{ secrets.ECS_CLUSTER_PROD }} \
            --services ${{ secrets.ECS_SERVICE_PROD }} \
            --query "services[0].taskDefinition" \
            --output text)
          echo "task_def=$CURRENT" >> $GITHUB_OUTPUT
          echo "Rollback target: $CURRENT"

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ steps.rollback-target.outputs.task_def }} \
            --query "taskDefinition" \
            > /tmp/prod-task-def.json

      - name: Render updated task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: /tmp/prod-task-def.json
          container-name:  app
          image:           ${{ steps.image.outputs.uri }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:            ${{ steps.render-task-def.outputs.task-definition }}
          service:                    ${{ secrets.ECS_SERVICE_PROD }}
          cluster:                    ${{ secrets.ECS_CLUSTER_PROD }}
          wait-for-service-stability: false

      - name: Wait for ECS to stabilize (10 min timeout)
        id: wait-stable
        run: |
          if timeout 600 aws ecs wait services-stable \
              --cluster ${{ secrets.ECS_CLUSTER_PROD }} \
              --services ${{ secrets.ECS_SERVICE_PROD }}; then
            echo "stable=true"  >> $GITHUB_OUTPUT
            echo "ECS service is stable."
          else
            echo "stable=false" >> $GITHUB_OUTPUT
            echo "ECS service did NOT stabilize within 10 minutes."
          fi

      - name: Auto-rollback on failure
        if: steps.wait-stable.outputs.stable == 'false'
        run: |
          echo "ROLLING BACK to: ${{ steps.rollback-target.outputs.task_def }}"
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER_PROD }} \
            --service  ${{ secrets.ECS_SERVICE_PROD }} \
            --task-definition ${{ steps.rollback-target.outputs.task_def }} \
            --force-new-deployment
          echo "Waiting for rollback to stabilize..."
          timeout 600 aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER_PROD }} \
            --services ${{ secrets.ECS_SERVICE_PROD }} || true
          echo "Rollback complete."

      - name: Fail pipeline after rollback
        if: steps.wait-stable.outputs.stable == 'false'
        run: exit 1

      - name: Verify production health via ALB
        if: steps.wait-stable.outputs.stable == 'true'
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names ${{ secrets.PROD_ALB_NAME }} \
            --query "LoadBalancers[0].DNSName" \
            --output text)

          echo "Checking http://$ALB_DNS/health/check ..."
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://$ALB_DNS/health/check" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed on attempt $i."
              echo "Live at: http://$ALB_DNS"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS - retrying in 15s..."
            sleep 15
          done
          echo "ERROR: Health check did not return 200 after 10 attempts."
          exit 1

      - name: Deployment summary
        if: steps.wait-stable.outputs.stable == 'true'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  PRODUCTION DEPLOYMENT COMPLETE"
          echo "  Image : ${{ steps.image.outputs.uri }}"
          echo "  Tag   : ${{ steps.image.outputs.tag }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Slack - production deploy succeeded
        if: steps.wait-stable.outputs.stable == 'true'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":white_check_mark: *Production deploy succeeded*",
              "attachments": [{
                "color": "good",
                "fields": [
                  { "title": "Repo",  "value": "${{ github.repository }}", "short": true },
                  { "title": "Tag",   "value": "${{ steps.image.outputs.tag }}", "short": true },
                  { "title": "Run",   "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>", "short": false }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack - production rolled back
        if: steps.wait-stable.outputs.stable == 'false'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":warning: *Production deploy FAILED - auto-rollback triggered*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  { "title": "Repo",           "value": "${{ github.repository }}", "short": true },
                  { "title": "Failed tag",     "value": "${{ steps.image.outputs.tag }}", "short": true },
                  { "title": "Rolled back to", "value": "${{ steps.rollback-target.outputs.task_def }}", "short": false },
                  { "title": "Run",            "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>", "short": false }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
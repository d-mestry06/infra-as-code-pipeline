name: CI - Lint, Build, Deploy to Staging

# pull_request → full pipeline: lint + build + staging deploy
# push to main  → build + push only (tags merge commit SHA for CD to promote)
#                 staging deploy skipped — already done during PR
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_VERSION: "1.6.6"

permissions:
  pull-requests: write
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Terraform Lint & Validate
  # Skipped on push to main — already passed on PR
  # ─────────────────────────────────────────────
  terraform-lint:
    name: Terraform Lint & Validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform format check
        run: terraform fmt -check -recursive terraform/

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Init tflint
        run: tflint --init
        working-directory: terraform/environments/staging

      - name: Terraform Init (staging, no backend)
        working-directory: terraform/environments/staging
        run: terraform init -backend=false

      - name: Terraform Validate (staging)
        working-directory: terraform/environments/staging
        run: terraform validate

      - name: Run tflint (staging)
        working-directory: terraform/environments/staging
        run: tflint --format compact

  # ─────────────────────────────────────────────
  # Job 2: Docker Build & Push to Staging ECR
  #
  # Runs on BOTH pull_request and push to main.
  #
  # On pull_request : github.sha = PR branch HEAD
  #                   image deployed to staging for review
  #
  # On push to main : github.sha = merge commit SHA
  #                   this is the SHA CD will use to promote
  #                   workflow_run branches:[main] matches correctly
  # ─────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [terraform-lint]
    if: |
      always() &&
      (needs.terraform-lint.result == 'success' ||
       needs.terraform-lint.result == 'skipped')

    outputs:
      image_uri: ${{ steps.build-push.outputs.image_uri }}
      image_tag: ${{ steps.build-push.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        id: build-push
        env:
          ECR_REGISTRY:   ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_STAGING }}
          IMAGE_TAG:      ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          docker build --build-arg APP_VERSION="$IMAGE_TAG" -t "$IMAGE_URI" app/
          docker tag "$IMAGE_URI" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

          docker push "$IMAGE_URI"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Built and pushed: $IMAGE_URI"

  # ─────────────────────────────────────────────
  # Job 3: Deploy to Staging
  # Only on pull_request — skipped on push to main
  # (staging was already validated during the PR run)
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build-push
    environment: staging
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image URI
        id: image
        run: |
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_STAGING }}:${{ github.sha }}"
          echo "uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_TASK_DEFINITION_STAGING }} \
            --query 'taskDefinition' \
            > /tmp/task-def.json

      - name: Update image in task definition
        id: update-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: /tmp/task-def.json
          container-name:  app
          image:           ${{ steps.image.outputs.uri }}

      - name: Deploy to ECS Staging
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:            ${{ steps.update-task-def.outputs.task-definition }}
          service:                    ${{ secrets.ECS_SERVICE_STAGING }}
          cluster:                    ${{ secrets.ECS_CLUSTER_STAGING }}
          wait-for-service-stability: true

      - name: Verify staging health check
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names ${{ secrets.STAGING_ALB_NAME }} \
            --query 'LoadBalancers[0].DNSName' \
            --output text)

          echo "Checking http://$ALB_DNS/health/check ..."
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://$ALB_DNS/health/check" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: got $STATUS - retrying in 15s..."
            sleep 15
          done
          echo "ERROR: Health check failed after 10 attempts."
          exit 1

      - name: Post staging URL to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          AWS_DEFAULT_REGION:    ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        with:
          script: |
            const { execSync } = require('child_process');
            const dns = execSync(
              `aws elbv2 describe-load-balancers --names ${{ secrets.STAGING_ALB_NAME }} --query 'LoadBalancers[0].DNSName' --output text`
            ).toString().trim();
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## ✅ Staging Deployment Successful',
                '',
                `**URL:** http://${dns}`,
                `**Image tag:** \`${{ github.sha }}\``,
                '',
                '_This exact image will be promoted to production after merge._',
              ].join('\n'),
            });

      - name: Slack - staging deploy success
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":white_check_mark: *Staging deploy succeeded*",
              "attachments": [{
                "color": "good",
                "fields": [
                  { "title": "Repo",   "value": "${{ github.repository }}", "short": true },
                  { "title": "Branch", "value": "${{ github.head_ref }}",   "short": true },
                  { "title": "Tag",    "value": "${{ github.sha }}",        "short": true },
                  { "title": "Actor",  "value": "${{ github.actor }}",      "short": true },
                  { "title": "Run",    "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>", "short": false }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack - staging deploy failed
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":x: *Staging deploy FAILED*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  { "title": "Repo",   "value": "${{ github.repository }}", "short": true },
                  { "title": "Branch", "value": "${{ github.head_ref }}",   "short": true },
                  { "title": "Tag",    "value": "${{ github.sha }}",        "short": true },
                  { "title": "Actor",  "value": "${{ github.actor }}",      "short": true },
                  { "title": "Run",    "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>", "short": false }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK